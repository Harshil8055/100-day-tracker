<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Duel Mode — 100-Day Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFE9DD; --paper-alt:#E6DFCF; --panel:#F7F3E9;
    --ink:#23201B; --ink-soft:#6B6455; --ink-faint:#9B9080;
    --saffron:#E8961C; --saffron-deep:#C97A0D; --maroon:#8A3A2E; --moss:#4C7A52;
    --rule:#C9BFA8; --rule-soft:#DDD5C1;
    --p1:#C97A0D; --p2:#4E6B8F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;color:var(--ink);overflow-x:hidden;}
  body{font-family:'Work Sans', sans-serif; font-size:14px; line-height:1.5; overflow-wrap:break-word; word-break:break-word;}
  .app{max-width:1080px;margin:0 auto;background:var(--paper);border:1px solid var(--rule);border-radius:4px;overflow-x:hidden;}
  .card, .banner, .setup-wrap, .setup-person{overflow-wrap:break-word; word-break:break-word;}
  .card pre, .banner pre, code{white-space:pre-wrap !important; word-break:break-word; overflow-wrap:anywhere;}
  .head{display:flex;align-items:flex-end;justify-content:space-between;padding:20px 28px 14px;border-bottom:2px solid var(--ink);
    background:radial-gradient(120px 60px at 92% -10%, rgba(232,150,28,0.18), transparent 70%), var(--paper);}
  .day-num{font-family:'Fraunces', serif;font-weight:700;font-size:44px;line-height:0.9;}
  .day-num sup{font-size:15px;font-weight:500;color:var(--ink-soft);margin-left:2px;}
  .head-meta .date{font-family:'Fraunces', serif;font-style:italic;font-size:15px;}
  .head-meta .week{font-family:'IBM Plex Mono', monospace;font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.07em;margin-top:2px;}
  .vs-mini{display:flex;gap:10px;align-items:center;font-family:'IBM Plex Mono', monospace;font-size:11px;}
  .vs-mini .who{padding:4px 10px;border-radius:14px;border:1px solid var(--rule);}
  .vs-mini .who.lead{font-weight:700;}
  .nav{display:flex;border-bottom:1px solid var(--rule);background:var(--paper-alt);overflow-x:auto;}
  .nav button{all:unset;cursor:pointer;padding:11px 16px;font-family:'IBM Plex Mono', monospace;font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-soft);border-right:1px solid var(--rule-soft);white-space:nowrap;}
  .nav button.active{color:var(--ink);background:var(--paper);box-shadow: inset 0 -2px 0 var(--saffron);}
  .person-switch{display:flex;gap:8px;padding:10px 28px 0;}
  .person-switch button{all:unset;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 14px;border-radius:16px;border:1.5px solid var(--rule);color:var(--ink-soft);}
  .person-switch button.active.p1sel{border-color:var(--p1);color:var(--p1);background:#FBF0DC;}
  .person-switch button.active.p2sel{border-color:var(--p2);color:var(--p2);background:#EAF0F7;}
  .content{padding:20px 28px 40px;}
  h2.section-title{font-family:'Fraunces', serif;font-weight:600;font-size:19px;margin:0 0 4px;}
  .section-sub{color:var(--ink-soft);font-size:12.5px;margin:0 0 16px;}
  .grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:22px;}
  .grid2v{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media (max-width:820px){ .grid2, .grid2v{grid-template-columns:1fr;} }
  .card{background:var(--panel);border:1px solid var(--rule-soft);border-radius:6px;padding:15px 17px;margin-bottom:14px;}
  .card h3{font-family:'Fraunces', serif;font-size:14.5px;margin:0 0 9px;display:flex;align-items:center;gap:7px;}
  .row{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed var(--rule-soft);font-size:13px;}
  .row:last-child{border-bottom:none;}
  .row .label{color:var(--ink-soft);}
  .row .val{font-weight:600;text-align:right;}
  .status-group{display:flex;gap:6px;flex-wrap:wrap;}
  .status-group button{all:unset;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;padding:5px 8px;border:1px solid var(--rule);border-radius:4px;color:var(--ink-soft);background:var(--paper);}
  .status-group button.sel-done{background:var(--moss);border-color:var(--moss);color:#fff;}
  .status-group button.sel-excused{background:#D9C68A;border-color:#C7B274;color:#3A3320;}
  .status-group button.sel-missed{background:var(--maroon);border-color:var(--maroon);color:#fff;}
  .status-group button.sel-recovery{background:#7C86A8;border-color:#7C86A8;color:#fff;}
  .field{margin-bottom:11px;}
  .field label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
  .field input, .field select, .field textarea{width:100%;font-family:'Work Sans',sans-serif;font-size:13.5px;padding:7px 9px;border:1px solid var(--rule);border-radius:4px;background:#fff;color:var(--ink);}
  .inline-fields{display:flex;gap:10px;}
  .inline-fields > div{flex:1;}
  .btn{all:unset;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.05em;padding:10px 18px;border-radius:4px;background:var(--ink);color:var(--paper);display:inline-block;}
  .btn.secondary{background:transparent;border:1px solid var(--ink);color:var(--ink);}
  .btn.small{padding:6px 11px;font-size:10.5px;}
  .btn[disabled]{opacity:0.4;cursor:not-allowed;}
  table.log{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.log th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--ink);padding:6px 8px;}
  table.log td{padding:6px 8px;border-bottom:1px solid var(--rule-soft);}
  .heat-row{display:flex;gap:3px;align-items:center;margin-bottom:6px;}
  .heat-row .heat-label{width:90px;font-size:10.5px;color:var(--ink-soft);flex-shrink:0;}
  .heat-cell{width:18px;height:18px;border-radius:3px;background:var(--rule-soft);flex-shrink:0;}
  .heat-cell[data-s="done"]{background:var(--moss);}
  .heat-cell[data-s="excused"]{background:#D9C68A;}
  .heat-cell[data-s="missed"]{background:var(--maroon);}
  .heat-cell[data-s="recovery"]{background:#7C86A8;}
  .banner{border:1px solid var(--saffron-deep);background:#FBF0DC;border-radius:6px;padding:13px 15px;margin-bottom:16px;font-size:13px;}
  .banner strong{color:var(--saffron-deep);}
  .lockbanner{border:1px solid var(--maroon);background:#F5E3DE;color:var(--maroon);border-radius:6px;padding:12px 15px;margin-bottom:16px;font-size:12.5px;font-family:'IBM Plex Mono',monospace;}
  .empty{color:var(--ink-faint);font-style:italic;font-size:12.5px;padding:8px 0;}
  .setup-wrap{padding:34px;}
  .setup-person{border:1px solid var(--rule-soft);border-radius:8px;padding:18px 20px;margin-bottom:16px;}
  .setup-person.p1b{border-left:5px solid var(--p1);}
  .setup-person.p2b{border-left:5px solid var(--p2);}
  .ledger-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px dashed var(--rule-soft);}
  .save-bar{position:sticky;bottom:0;display:flex;justify-content:space-between;align-items:center;background:var(--paper);border-top:1px solid var(--rule);padding:12px 28px;margin:0 -28px -40px;}
  .save-msg{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--moss);}
  .big-balance{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script type="module">
(function(){

/* ============ SHARED PLAN DATA ============ */
const GYM = {0:"Rest from gym & badminton",1:"Chest & Shoulder",2:"Back & Arms",3:"Legs & Core",4:"Shoulder & Chest",5:"Arms & Back",6:"Rest / active recovery"};
const GYM_SCHEDULED = {0:false,1:true,2:true,3:true,4:true,5:true,6:true};
const BADMINTON = {0:false,1:true,2:true,3:true,4:false,5:true,6:true};
const TEMPLE = {5:true,6:true};
const CHORE_EXTRA = {4:"Laundry",6:"Bathroom clean",0:"Laundry + bedsheet + doormats"};
const BODY_FULL = {
  1:{face:"Cleanser → Salicylic → Moisturizer → Lip balm",body:"De-tan pack → Lotion → Almond oil",hair:"Hair oil + Scalp ointment"},
  2:{face:"Cleanser → Retinol → Moisturizer → Lip balm",body:"Glycolic acid → Lotion",hair:"Hair oil if missed Mon; else rest"},
  3:{face:"Cleanser → Moisturizer",body:"Shower + gentle scrub → Lotion",hair:"Wash day"},
  4:{face:"Cleanser → Retinol → Moisturizer",body:"De-tan pack → Lotion",hair:"Scalp ointment"},
  5:{face:"Cleanser → Salicylic → Moisturizer",body:"Glycolic acid → Lotion",hair:"Hair oil + Scalp ointment"},
  6:{face:"Cleanser → Retinol → Moisturizer",body:"Moisturize only",hair:"Hair mask"},
  0:{face:"Face pack → Moisturizer → Lip balm",body:"Spa + Lotion + Almond oil",hair:"Wash day"}
};
const NIGHT_FACE = {
  1:"Cleanser → Salicylic → Moisturizer",2:"Cleanser → Retinol → Moisturizer",3:"Cleanser → Moisturizer",
  4:"Cleanser → Retinol → Moisturizer",5:"Cleanser → Salicylic → Moisturizer",6:"Cleanser → Retinol → Moisturizer",0:"Face pack → Moisturizer"
};
const SD_WEEK = {1:"Done: Ch1–3 (Scale, Estimation, Framework)",2:"Ch4: Rate Limiter",3:"Ch5: Consistent Hashing",4:"Ch6: Key-Value Store",
  5:"Ch7: Unique ID Generator",6:"Ch8: URL Shortener",7:"Ch9: Web Crawler",8:"Ch10: Notification System (tie to ASB)",9:"Ch11: News Feed System",
  10:"Ch12–13: Chat System, Search Autocomplete",11:"Ch14: Video Streaming (skim) + revision begins",12:"Full mock mode: 1 HLD mock/week",13:"Full mock mode: 1 HLD mock/week"};
const LLD_WEEK = {2:"Parking Lot System",3:"Elevator System",4:"Library Management System",6:"Splitwise / Expense Sharing",8:"Tic-Tac-Toe / Chess",10:"Rate Limiter (in-process)"};
const TOPIC_WEEK = {1:"C# deep-dive: delegates, generics, LINQ, GC/boxing, SOLID",2:"Design Patterns I: Singleton, Factory, Builder, Adapter, Decorator",
  3:"Design Patterns II: Strategy, Observer, CoR + Async/await",4:"(SD/LLD only this week)",5:"Azure Core: App Service, Functions, Storage, Key Vault; Microservices",
  6:"Azure Service Bus: queues vs topics, dead-lettering, sessions; Kafka conceptual",7:"(SD only this week)",8:"SQL + LINQ mastery: indexing, joins, window functions",
  9:"CI/CD stages, blue-green/canary; Kubernetes concepts only",10:"React refresh: hooks, component design, state management",
  11:"Revision + full mock mode",12:"Revision + full mock mode",13:"Revision + full mock mode"};
function weekOf(dIdx){ return Math.min(13, Math.max(1, Math.ceil(dIdx/7))); }
function codeBlock2Label(dow, dIdx){
  const wk = weekOf(dIdx);
  if(dow===1||dow===3||dow===5){ let l = "SD — "+SD_WEEK[wk]; if(LLD_WEEK[wk]) l += " · LLD: "+LLD_WEEK[wk]; return l; }
  if(dow===2||dow===4||dow===6){ return "Topic — " + TOPIC_WEEK[wk]; }
  return null;
}
function fullCodeWeekTable(currentWeek){
  let rows = "";
  for(let w=1; w<=13; w++){
    const hi = w===currentWeek ? 'style="background:#FBF0DC;font-weight:600;"' : "";
    rows += `<tr ${hi}><td>${w}${w===currentWeek?" ◂":""}</td><td>${SD_WEEK[w]}</td><td>${LLD_WEEK[w]||"—"}</td><td>${TOPIC_WEEK[w]}</td></tr>`;
  }
  rows += `<tr ${currentWeek>13?'style="background:#FBF0DC;font-weight:600;"':""}><td>14+</td><td colspan="3">Bonus sprint (Days 91–100): 1 DSA/SD/LLD/behavioral mock each per week + job-search follow-ups</td></tr>`;
  return `<table class="log"><thead><tr><th>Wk</th><th>SD (Mon/Wed/Fri)</th><th>LLD</th><th>Topic (Tue/Thu/Sat)</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function fullBodyWeekTable(currentDow){
  const order = [1,2,3,4,5,6,0];
  const names = {1:"Mon",2:"Tue",3:"Wed",4:"Thu",5:"Fri",6:"Sat",0:"Sun"};
  let rows = order.map(d=>{
    const hi = d===currentDow ? 'style="background:#FBF0DC;font-weight:600;"' : "";
    const b = BODY_FULL[d];
    return `<tr ${hi}><td>${names[d]}${d===currentDow?" ◂":""}</td><td>${b.face}</td><td>${b.body}</td><td>${b.hair}</td></tr>`;
  }).join("");
  return `<table class="log"><thead><tr><th>Day</th><th>Face (night)</th><th>Body (night)</th><th>Hair</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function fullNightFaceTable(currentDow){
  const order = [1,2,3,4,5,6,0];
  const names = {1:"Mon",2:"Tue",3:"Wed",4:"Thu",5:"Fri",6:"Sat",0:"Sun"};
  let rows = order.map(d=>{
    const hi = d===currentDow ? 'style="background:#FBF0DC;font-weight:600;"' : "";
    return `<tr ${hi}><td>${names[d]}${d===currentDow?" ◂":""}</td><td>${NIGHT_FACE[d]}</td></tr>`;
  }).join("");
  return `<table class="log"><thead><tr><th>Day</th><th>Night face routine</th></tr></thead><tbody>${rows}</tbody></table>`;
}

const TIME_COST = { gym:60, badminton:60, dsa:60, interviewPrep:60, dietLogged:10, diyaBati:5, chores:30, bodyCare:20, nightFace:15, temple:30 };

const PROFILE = {
  full: { core:["dsa","diyaBati","dietLogged"], always:["chores","bodyCare"], codeField:"dsa", codeLabel:"DSA" },
  fitnessPlus: { core:["interviewPrep","dietLogged"], always:["nightFace"], codeField:"interviewPrep", codeLabel:"Interview Prep" }
};

/* ============ DATE HELPERS ============ */
function pad(n){return n<10?"0"+n:""+n;}
function isoOf(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function isoToDate(iso){const [y,m,d]=iso.split("-").map(Number); return new Date(y,m-1,d);}
function addDays(iso,n){const d=isoToDate(iso); d.setDate(d.getDate()+n); return isoOf(d);}
function dayIndexOf(iso,startISO){const d=isoToDate(iso); const s=isoToDate(startISO); return Math.round((d-s)/86400000)+1;}
function isoOfDayIndex(n,startISO){return addDays(startISO,n-1);}
function weekdayName(iso){return isoToDate(iso).toLocaleDateString('en-US',{weekday:'long'});}
function prettyDate(iso){const d=isoToDate(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function todayISO(){return isoOf(new Date());}

/* ============ STORAGE (window.storage = local fallback; custom backend = shared cloud sync) ============ */
const STORE_KEY = "duel-tracker-state-v1";
const BACKEND_CONFIG_KEY = "duel-backend-config-v1";
let state = null;
let fb = { url:"", roomCode:"", enabled:false, status:"offline", pollTimer:null, lastLocalWriteTs:0 };

async function loadBackendConfig(){
  try{
    const res = await window.storage.get(BACKEND_CONFIG_KEY, false);
    if(res && res.value) return JSON.parse(res.value);
  }catch(e){}
  return null;
}
async function saveBackendConfig(url, roomCode){
  await window.storage.set(BACKEND_CONFIG_KEY, JSON.stringify({url, roomCode}), false);
}
async function clearBackendConfig(){
  try{ await window.storage.delete(BACKEND_CONFIG_KEY, false); }catch(e){}
  if(fb.pollTimer) clearInterval(fb.pollTimer);
  fb = { url:"", roomCode:"", enabled:false, status:"offline", pollTimer:null, lastLocalWriteTs:0 };
}
function backendGetUrl(){ return fb.url + (fb.url.includes("?")?"&":"?") + "room=" + encodeURIComponent(fb.roomCode); }
async function connectBackend(url, roomCode){
  url = url.trim().replace(/\/$/, "");
  const res = await fetch(url + "?room=" + encodeURIComponent(roomCode));
  if(!res.ok){ const body = await res.json().catch(()=>({})); throw new Error(body.error || ("HTTP "+res.status)); }
  await res.json(); // confirms it's actually our backend's JSON shape
  fb.url = url; fb.roomCode = roomCode; fb.enabled = true; fb.status = "connecting";
  await saveBackendConfig(url, roomCode);
  await pollBackend();
  fb.status = "synced";
  if(fb.pollTimer) clearInterval(fb.pollTimer);
  fb.pollTimer = setInterval(pollBackend, 5000); // cheap enough to feel near-instant, well under free-tier limits
}
async function pollBackend(){
  if(!fb.enabled) return;
  try{
    const res = await fetch(backendGetUrl());
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    fb.status = "synced";
    if(!data.payload) return;
    const parsed = JSON.parse(data.payload);
    if(parsed._writeTs && Math.abs(parsed._writeTs - fb.lastLocalWriteTs) < 4000) return; // our own recent write, ignore echo
    state = parsed; render();
  }catch(e){ console.error("Backend poll failed", e); fb.status = "error"; }
}
async function pushStateToBackend(){
  if(!fb.enabled) return;
  const ts = Date.now();
  fb.lastLocalWriteTs = ts;
  const payloadObj = Object.assign({}, state, { _writeTs: ts });
  try{
    const res = await fetch(fb.url + "?room=" + encodeURIComponent(fb.roomCode), {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ payload: JSON.stringify(payloadObj) })
    });
    fb.status = res.ok ? "synced" : "error";
  }catch(e){ console.error("Backend push failed", e); fb.status = "error"; }
}

const SHEETS_CONFIG_KEY = "duel-sheets-config-v1";
let sheets = { url:"", roomCode:"", enabled:false, status:"offline", pollTimer:null, lastLocalWriteTs:0 };
async function loadSheetsConfig(){
  try{ const res = await window.storage.get(SHEETS_CONFIG_KEY, false); if(res && res.value) return JSON.parse(res.value); }catch(e){}
  return null;
}
async function saveSheetsConfig(url, roomCode){ await window.storage.set(SHEETS_CONFIG_KEY, JSON.stringify({url, roomCode}), false); }
async function clearSheetsConfig(){
  try{ await window.storage.delete(SHEETS_CONFIG_KEY, false); }catch(e){}
  if(sheets.pollTimer) clearInterval(sheets.pollTimer);
  sheets = { url:"", roomCode:"", enabled:false, status:"offline", pollTimer:null, lastLocalWriteTs:0 };
}
async function connectSheets(url, roomCode){
  url = url.trim().replace(/\/$/, "");
  const testUrl = url + (url.includes("?")?"&":"?") + "room=" + encodeURIComponent(roomCode);
  const res = await fetch(testUrl);
  if(!res.ok) throw new Error("Web app didn't respond OK (HTTP "+res.status+")");
  await res.json(); // will throw if not valid JSON, i.e. not our Apps Script
  sheets.url = url; sheets.roomCode = roomCode; sheets.enabled = true; sheets.status = "connected";
  await saveSheetsConfig(url, roomCode);
  await pollSheets();
  if(sheets.pollTimer) clearInterval(sheets.pollTimer);
  sheets.pollTimer = setInterval(pollSheets, 20000); // Apps Script has no push, poll every 20s
}
async function pollSheets(){
  if(!sheets.enabled) return;
  try{
    const url = sheets.url + (sheets.url.includes("?")?"&":"?") + "room=" + encodeURIComponent(sheets.roomCode);
    const res = await fetch(url);
    const data = await res.json();
    sheets.status = "connected";
    if(!data.payload) return;
    const parsed = JSON.parse(data.payload);
    if(parsed._writeTs && Math.abs(parsed._writeTs - sheets.lastLocalWriteTs) < 15000) return; // our own recent write, ignore echo
    state = parsed; render();
  }catch(e){ console.error("Sheets poll failed", e); sheets.status = "error"; }
}
async function pushStateToSheets(){
  if(!sheets.enabled) return;
  const ts = Date.now();
  sheets.lastLocalWriteTs = ts;
  const payloadObj = Object.assign({}, state, { _writeTs: ts });
  try{
    await fetch(sheets.url, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" }, // avoids CORS preflight against Apps Script
      body: JSON.stringify({ room: sheets.roomCode, payload: JSON.stringify(payloadObj) })
    });
    sheets.status = "connected";
  }catch(e){ console.error("Sheets push failed", e); sheets.status = "error"; }
}

function defaultState(){
  return {
    setup:{
      locked:false,
      startISO: todayISO(),
      lengthDays:100,
      hourlyRate:{p1:500,p2:500},
      startingBalance:{p1:5000,p2:5000},
      people:{
        p1:{name:"", profile:"full", startWeight:85, targetWeight:75},
        p2:{name:"", profile:"fitnessPlus", startWeight:73, targetWeight:55}
      }
    },
    entries:{p1:{}, p2:{}},
    dsaLog:{p1:[], p2:[]},
    meta:{ interviewScheduledP1:false, scratch:{} }
  };
}
function emptyEntry(profileKey, iso){
  const dow = isoToDate(iso).getDay();
  const base = {
    iso, gym: GYM_SCHEDULED[dow]?"":"", gymHome:false,
    badminton: BADMINTON[dow]?"":"", badmintonSteps:"",
    dietLogged:"", calories:"", protein:"", sugarFree:false, packetFree:false, maidaFree:false, waterL:"",
    temple: TEMPLE[dow]?"":"",
    sleepHrs:"", weightKg:"",
    win:"", trap:"", notes:""
  };
  if(profileKey==="full"){
    Object.assign(base,{ dsa:"", dsaMinutes:"", dsaConfidence:"", codeBlock2:"", codeBlock3:"", diyaBati:"", chores:"", bodyCare:"" });
  } else {
    Object.assign(base,{ interviewPrep:"", nightFace:"" });
  }
  return base;
}
async function loadState(){
  try{
    const res = await window.storage.get(STORE_KEY, false);
    state = (res && res.value) ? JSON.parse(res.value) : defaultState();
  }catch(e){ state = defaultState(); }
  if(!state.meta) state.meta = { interviewScheduledP1:false, scratch:{} };
  if(!state.dsaLog) state.dsaLog = {p1:[],p2:[]};

  const bc = await loadBackendConfig();
  if(bc && bc.url && bc.roomCode){
    try{ await connectBackend(bc.url, bc.roomCode); }
    catch(e){ console.error("auto-connect failed", e); fb.status="error"; }
  }
  const shc = await loadSheetsConfig();
  if(shc && shc.url && shc.roomCode){
    try{ await connectSheets(shc.url, shc.roomCode); }
    catch(e){ console.error("sheets auto-connect failed", e); sheets.status="error"; }
  }
}
let saveTimer=null;

/* ============ CHALLENGE WINDOW ============ */
function endISO(){ return addDays(state.setup.startISO, state.setup.lengthDays-1); }
function challengeOver(){ return todayISO() > endISO(); }
function clampToWindow(iso){
  if(iso < state.setup.startISO) return state.setup.startISO;
  if(iso > endISO()) return endISO();
  return iso;
}

/* ============ NON-NEGOTIABLES / STREAKS / SCORING ============ */
function statusCountsAsDone(v){ return v==="done" || v==="recovery"; }
function nonNegList(person, iso){
  const profileKey = state.setup.people[person].profile;
  const cfg = PROFILE[profileKey];
  const dow = isoToDate(iso).getDay();
  let list = cfg.core.slice();
  if(GYM_SCHEDULED[dow]) list.push("gym");
  if(BADMINTON[dow]) list.push("badminton");
  if(TEMPLE[dow]) list.push("temple");
  list = list.concat(cfg.always);
  return list;
}
function consistencyFor(person, iso){
  const e = state.entries[person][iso]; if(!e) return null;
  const list = nonNegList(person, iso);
  let num=0, den=0;
  list.forEach(f=>{
    const v = f==="dietLogged" ? (e.dietLogged==="yes"?"done":e.dietLogged==="no"?"missed":"") : e[f];
    if(v==="" || v===undefined) return;
    if(v==="excused" || v==="na") return;
    den++;
    if(statusCountsAsDone(v)) num++;
  });
  if(den===0) return null;
  return Math.round((num/den)*100);
}
function computeStreak(person, field, uptoIso){
  const upto = dayIndexOf(uptoIso, state.setup.startISO);
  let streak=0;
  for(let n=1;n<=upto;n++){
    const iso = isoOfDayIndex(n, state.setup.startISO);
    const e = state.entries[person][iso];
    const v = e ? (field==="dietLogged" ? (e.dietLogged==="yes"?"done":e.dietLogged==="no"?"missed":"") : e[field]) : "";
    if(v===""||v===undefined) continue;
    if(v==="excused"||v==="na") continue;
    if(statusCountsAsDone(v)) streak++;
    else if(v==="missed") streak=0;
  }
  return streak;
}
function isZeroDay(person, e){
  if(!e) return false;
  const profileKey = state.setup.people[person].profile;
  const codeField = PROFILE[profileKey].codeField;
  const codeMiss = e[codeField]==="missed" || e[codeField]==="" || e[codeField]===undefined;
  const dietMiss = e.dietLogged!=="yes";
  const gymMiss = !(e.gym==="done"||e.gym==="recovery"||e.gymHome);
  const spiritMiss = profileKey==="full" ? (e.diyaBati==="missed"||e.diyaBati==="") : false;
  return codeMiss && dietMiss && gymMiss && (profileKey==="full"?spiritMiss:true);
}
function noZeroDayStreak(person, uptoIso){
  const upto = dayIndexOf(uptoIso, state.setup.startISO);
  let streak=0;
  for(let n=1;n<=upto;n++){
    const e = state.entries[person][isoOfDayIndex(n, state.setup.startISO)];
    if(!e) continue;
    if(isZeroDay(person,e)) streak=0; else streak++;
  }
  return streak;
}

/* ============ PENALTIES / BALANCES ============ */
function penaltyTotalsUpTo(uptoIso){
  const upto = Math.min(dayIndexOf(uptoIso, state.setup.startISO), state.setup.lengthDays);
  let total = {p1:0, p2:0};
  let txns = [];
  for(let n=1;n<=upto;n++){
    const iso = isoOfDayIndex(n, state.setup.startISO);
    ["p1","p2"].forEach(person=>{
      const e = state.entries[person][iso]; if(!e) return;
      const list = nonNegList(person, iso);
      list.forEach(f=>{
        const v = f==="dietLogged" ? (e.dietLogged==="yes"?"done":e.dietLogged==="no"?"missed":"") : e[f];
        if(v==="missed"){
          const mins = TIME_COST[f] || 30;
          const rate = state.setup.hourlyRate[person] || 0;
          const cost = Math.round((mins/60)*rate);
          total[person]+=cost;
          txns.push({iso, person, field:f, cost});
        }
      });
    });
  }
  return {total, txns};
}
function balances(uptoIso){
  const {total} = penaltyTotalsUpTo(uptoIso);
  const bal1 = state.setup.startingBalance.p1 - total.p1 + total.p2;
  const bal2 = state.setup.startingBalance.p2 - total.p2 + total.p1;
  return {p1:bal1, p2:bal2, penalty:total};
}

function renderWaterSummary(container, iso){
  const upto = dayIndexOf(iso, state.setup.startISO);
  const start = Math.max(1, upto-6);
  let html = "";
  ["p1","p2"].forEach(p=>{
    const name = state.setup.people[p].name;
    let vals = [];
    for(let n=start;n<=upto;n++){
      const d = isoOfDayIndex(n, state.setup.startISO);
      const e2 = state.entries[p][d];
      vals.push({d, v: e2 && e2.waterL!=="" && e2.waterL!=null ? Number(e2.waterL) : null});
    }
    const logged = vals.filter(x=>x.v!==null);
    const avg = logged.length ? (logged.reduce((s,x)=>s+x.v,0)/logged.length).toFixed(1) : "—";
    const todayVal = vals[vals.length-1].v;
    html += `<div class="card"><h3 style="color:var(--${p});">${name}</h3>
      <div class="row"><span class="label">Today</span><span class="val">${todayVal!==null? todayVal+"L / 3L" : "not logged"}</span></div>
      <div class="row"><span class="label">7-day average</span><span class="val">${avg}${avg!=="—"?"L":""}</span></div>
      <div style="display:flex;gap:4px;margin-top:8px;height:44px;align-items:flex-end;">
        ${vals.map(x=>`<div title="${prettyDate(x.d)}: ${x.v!==null?x.v+'L':'not logged'}" style="flex:1;height:${x.v!==null?Math.min(40,Math.max(4,x.v/3*40)):3}px;background:${x.v!==null?(x.v>=3?'var(--moss)':'#D9C68A'):'var(--rule-soft)'};border-radius:2px;"></div>`).join("")}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}
function renderHeatmap(container, person, iso){
  const profileKey = state.setup.people[person].profile;
  const cfg = PROFILE[profileKey];
  const upto = dayIndexOf(iso, state.setup.startISO);
  const start = Math.max(1, upto-13);
  const domains = profileKey==="full" ?
    [["gym","Gym"],["badminton","Badm"],["dsa","Code"],["diyaBati","Diya"],["chores","Chores"],["bodyCare","Body"]] :
    [["gym","Gym"],["badminton","Badm"],["interviewPrep","Code"],["nightFace","Face"]];

  domains.forEach(([field,label])=>{
    let cells="";
    for(let n=start;n<=upto;n++){
      const dayIso = isoOfDayIndex(n, state.setup.startISO);
      const e2 = state.entries[person][dayIso];
      const v = e2 ? (e2[field]||"na") : "na";
      cells += `<div class="heat-cell" data-s="${v}" data-iso="${dayIso}" data-person="${person}" title="Day ${n} — ${prettyDate(dayIso)}" style="cursor:pointer;"></div>`;
    }
    html += `<div class="heat-row"><div class="heat-label">${label}</div>${cells}</div>`;

      render();

function renderVersus(tab, iso){
  const {total, txns} = penaltyTotalsUpTo(iso);
  const bal = balances(iso);
  const n1 = state.setup.people.p1.name, n2 = state.setup.people.p2.name;
  let dayWinsP1=0, dayWinsP2=0, ties=0, sumP1=0, sumP2=0, days=0;
  const upto = dayIndexOf(iso, state.setup.startISO);
  for(let n=1;n<=upto;n++){
    const d = isoOfDayIndex(n, state.setup.startISO);

    if(c1===null && c2===null) continue;
    days++;
    sumP1 += c1||0; sumP2 += c2||0;
    if((c1||0)>(c2||0)) dayWinsP1++; else if((c2||0)>(c1||0)) dayWinsP2++; else ties++;
  }
  const avg1 = days? Math.round(sumP1/days):0, avg2 = days? Math.round(sumP2/days):0;

  tab.innerHTML = `
    <h2 class="section-title">Versus &amp; Stakes</h2>

      <div class="card"><h3 style="color:var(--p1);">${n1}</h3>
        <div class="big-balance" style="color:var(--p1);">₹${bal.p1}</div>

        <div class="row"><span class="label">Day wins</span><span class="val">${dayWinsP1}</span></div>
        <div class="row"><span class="label">Avg consistency</span><span class="val">${avg1}%</span></div>
      </div>
      <div class="card"><h3 style="color:var(--p2);">${n2}</h3>
        <div class="big-balance" style="color:var(--p2);">₹${bal.p2}</div>
        <div class="row"><span class="label">Total self-penalties paid</span><span class="val">₹${total.p2}</span></div>
        <div class="row"><span class="label">Day wins</span><span class="val">${dayWinsP2}</span></div>
        <div class="row"><span class="label">Avg consistency</span><span class="val">${avg2}%</span></div>
      </div>
    </div>
    <div class="card"><div class="row"><span class="label">Ties so far</span><span class="val">${ties}</span></div>
      ${challengeOver()? `<div class="row"><span class="label" style="font-weight:700;">Overall winner</span><span class="val" style="font-weight:700;">${avg1>avg2?n1:(avg2>avg1?n2:(bal.p1>bal.p2?n1:(bal.p2>bal.p1?n2:"Tie")))}</span></div>`:""}
    </div>
    <h3 style="font-family:'Fraunces',serif;margin:20px 0 10px;">Recent transactions</h3>
    <div class="card">
      ${txns.slice(-15).reverse().map(t=>`<div class="ledger-row"><span>${prettyDate(t.iso)} — ${state.setup.people[t.person].name} missed ${t.field}</span><span style="color:var(--maroon);">-₹${t.cost} → ${t.person==='p1'?n2:n1}</span></div>`).join("") || `<div class="empty">No missed tasks logged yet — clean ledger.</div>`}
    </div>
  `;
}

/* ============ LOG TAB (DSA / interview prep entries) ============ */
function renderLog(tab, iso){
  const person = activePerson;
  const profileKey = state.setup.people[person].profile;
  const label = profileKey==="full" ? "Problem" : "Topic";
  const log = state.dsaLog[person];
  tab.innerHTML = `
    <h2 class="section-title">${state.setup.people[person].name}'s Log</h2>
    <div class="card"><h3>Add entry</h3>
      <div class="inline-fields"><div class="field"><label>${label}</label><input id="l-name"/></div><div class="field"><label>Category/Topic area</label><input id="l-cat"/></div></div>
      <div class="inline-fields"><div class="field"><label>Time (min)</label><input type="number" id="l-time"/></div><div class="field"><label>Confidence 1–5</label><input type="number" min="1" max="5" id="l-conf"/></div></div>
      <button class="btn small" id="add-log">Add</button>
    </div>
    <div class="card"><h3>Log (${log.length})</h3><div style="overflow-x:auto;"><table class="log">
      <thead><tr><th>Date</th><th>${label}</th><th>Category</th><th>Time</th><th>Conf</th></tr></thead>
      <tbody>${log.slice().reverse().map(p=>`<tr><td>${prettyDate(p.date)}</td><td>${p.name}</td><td>${p.category}</td><td>${p.time}m</td><td>${p.confidence}</td></tr>`).join("") || `<tr><td colspan="5" class="empty">No entries yet.</td></tr>`}</tbody>
    </table></div></div>
  `;
  document.getElementById("add-log").onclick = ()=>{
    const name = document.getElementById("l-name").value.trim(); if(!name) return;
    log.push({ date: iso, name, category: document.getElementById("l-cat").value.trim(), time: Number(document.getElementById("l-time").value)||0, confidence: Number(document.getElementById("l-conf").value)||"" });
    persist(true); renderLog(tab, iso);
  };
}

/* ============ WEIGHT TAB ============ */
function renderWeight(tab, iso){
  tab.innerHTML = `<h2 class="section-title">Weight Trend</h2><div class="grid2v"><div id="w-p1"></div><div id="w-p2"></div></div>`;
  ["p1","p2"].forEach(p=>{
    const person = state.setup.people[p];
    const logs = Object.values(state.entries[p]).filter(x=>x.weightKg!=="" && x.weightKg!=null).map(x=>({iso:x.iso, kg:Number(x.weightKg)})).sort((a,b)=>a.iso.localeCompare(b.iso));
    const el = document.getElementById("w-"+p);
    el.innerHTML = `<div class="card"><h3 style="color:var(--${p});">${person.name} — ${person.startWeight}kg → ${person.targetWeight}kg</h3><div id="chart-${p}"></div>
      <div class="row"><span class="label">Latest</span><span class="val">${logs.length? logs[logs.length-1].kg+"kg" : "—"}</span></div></div>`;
    renderChart(document.getElementById("chart-"+p), logs, person.startWeight, person.targetWeight);
  });
}
function renderChart(container, logs, startW, targetW){
  const W=440,H=190,PAD=30;
  const len = state.setup.lengthDays;
  const xFor = (dIdx)=> PAD + (dIdx-1)/(len-1)*(W-2*PAD);
  const yMin = Math.min(startW,targetW)-3, yMax = Math.max(startW,targetW)+3;
  const yFor = (kg)=> H-PAD - (kg-yMin)/(yMax-yMin)*(H-2*PAD);
  let pts = logs.map(l=>`${xFor(dayIndexOf(l.iso, state.setup.startISO))},${yFor(l.kg)}`).join(" ");
  const targetY = yFor(targetW), baseY = yFor(startW);
  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">
    <line x1="${PAD}" y1="${targetY}" x2="${W-PAD}" y2="${targetY}" stroke="#4C7A52" stroke-dasharray="4,4"/>
    <text x="${W-PAD}" y="${targetY-4}" text-anchor="end" font-size="9" fill="#4C7A52" font-family="IBM Plex Mono, monospace">target ${targetW}kg</text>
    <line x1="${PAD}" y1="${baseY}" x2="${W-PAD}" y2="${baseY}" stroke="#9B9080" stroke-dasharray="2,3"/>
    <text x="${PAD}" y="${baseY-4}" font-size="9" fill="#9B9080" font-family="IBM Plex Mono, monospace">start ${startW}kg</text>
    ${pts? `<polyline points="${pts}" fill="none" stroke="#23201B" stroke-width="2"/>`:""}
    ${logs.map(l=>`<circle cx="${xFor(dayIndexOf(l.iso, state.setup.startISO))}" cy="${yFor(l.kg)}" r="3" fill="#E8961C"/>`).join("")}
  </svg>`;
  container.innerHTML = logs.length? svg : `<div class="empty">No weight entries yet.</div>`;
}

/* ============ REVIEW TAB ============ */
function renderReview(tab, iso){
  const dow = isoToDate(iso).getDay();
  const dIdx = dayIndexOf(iso, state.setup.startISO);
  const start = Math.max(1, dIdx-6);
  function weekAvg(p){
    let sum=0,count=0;
    for(let n=start;n<=dIdx;n++){ const c=consistencyFor(p, isoOfDayIndex(n, state.setup.startISO)); if(c!==null){sum+=c;count++;} }
    return count? Math.round(sum/count):null;
  }
  tab.innerHTML = `
    <h2 class="section-title">Weekly Review</h2>
    <p class="section-sub">Trailing 7 days ending ${prettyDate(iso)}. ${dow===0?"":"(Full review runs on Sundays — this is a live preview.)"}</p>
    <div class="grid2v">
      <div class="card"><h3 style="color:var(--p1);">${state.setup.people.p1.name}</h3><div class="row"><span class="label">Weekly consistency</span><span class="val">${weekAvg("p1")??"—"}%</span></div></div>
      <div class="card"><h3 style="color:var(--p2);">${state.setup.people.p2.name}</h3><div class="row"><span class="label">Weekly consistency</span><span class="val">${weekAvg("p2")??"—"}%</span></div></div>
    </div>
    <div class="card"><h3>Notes for this week</h3><div class="field"><textarea id="scratch" style="min-height:80px;">${state.meta.scratch[iso]||""}</textarea></div></div>
  `;
  document.getElementById("scratch").addEventListener("change",(ev)=>{ state.meta.scratch[iso]=ev.target.value; persist(true); });
}

init();
})();
</script>
</body>
